<svg viewBox="0 0 210 295" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="ptex" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.055" numOctaves="3" seed="22" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="psh" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="105" cy="287" rx="50" ry="9" fill="#5F7A6C" opacity="0.13" filter="url(#psh)"/>

  <!-- ====== PARTY HAT ====== -->
  <!-- cone -->
  <path d="M105,14 L70,90 L140,90 Z" fill="#D4B46A" filter="url(#ptex)"/>
  <!-- highlight stripe -->
  <path d="M105,14 L92,56 L100,56 Z" fill="#E3C98B" opacity="0.55"/>
  <path d="M105,14 L110,56 L118,56 Z" fill="rgba(255,255,255,0.18)"/>
  <!-- band -->
  <rect x="68" y="85" width="74" height="13" rx="5" fill="#5F7A6C"/>
  <!-- gold dots on band -->
  <circle cx="83" cy="91" r="3" fill="#D4B46A"/>
  <circle cx="105" cy="91" r="3" fill="#D4B46A"/>
  <circle cx="127" cy="91" r="3" fill="#D4B46A"/>
  <!-- pom-pom -->
  <circle cx="105" cy="12" r="13" fill="#F2EDE4" opacity="0.88"/>
  <circle cx="105" cy="12" r="9" fill="#E3C98B"/>
  <circle cx="101" cy="8" r="3.5" fill="rgba(255,255,255,0.65)"/>

  <!-- ====== HEAD ====== -->
  <ellipse cx="105" cy="122" rx="50" ry="46" fill="#8FAF9B" filter="url(#ptex)"/>
  <!-- subtle light patch -->
  <ellipse cx="90" cy="110" rx="22" ry="18" fill="rgba(255,255,255,0.14)"/>

  <!-- ====== EYES ====== -->
  <!-- left -->
  <circle cx="82" cy="117" r="22" fill="#F2EDE4"/>
  <circle cx="82" cy="117" r="17" fill="#5F7A6C"/>
  <circle cx="82" cy="117" r="10" fill="#1E2E28"/>
  <circle cx="76" cy="110" r="5" fill="rgba(255,255,255,0.88)"/>
  <circle cx="86" cy="122" r="2" fill="rgba(255,255,255,0.40)"/>
  <!-- right -->
  <circle cx="128" cy="117" r="22" fill="#F2EDE4"/>
  <circle cx="128" cy="117" r="17" fill="#5F7A6C"/>
  <circle cx="128" cy="117" r="10" fill="#1E2E28"/>
  <circle cx="122" cy="110" r="5" fill="rgba(255,255,255,0.88)"/>
  <circle cx="132" cy="122" r="2" fill="rgba(255,255,255,0.40)"/>

  <!-- ====== BEAK ====== -->
  <path d="M97,140 L105,155 L113,140 Q105,134 97,140 Z" fill="#D4B46A"/>
  <path d="M99,147 L105,155 L111,147" stroke="#B88A32" stroke-width="1.2" fill="none"/>

  <!-- ====== BODY ====== -->
  <ellipse cx="105" cy="205" rx="72" ry="76" fill="#8FAF9B" filter="url(#ptex)"/>
  <!-- belly lighter wash -->
  <ellipse cx="105" cy="218" rx="50" ry="55" fill="#A8C4B4" opacity="0.42"/>
  <!-- body light spot -->
  <ellipse cx="85" cy="188" rx="18" ry="24" fill="rgba(255,255,255,0.11)"/>

  <!-- ====== HEART on chest ====== -->
  <path d="M105,194 C105,194 86,180 86,169 C86,161 93,157 99,161 C101,163 105,167 105,167
           C105,167 109,163 111,161 C117,157 124,161 124,169 C124,180 105,194 105,194 Z"
    fill="#5F7A6C" opacity="0.55"/>
  <path d="M105,194 C105,194 86,180 86,169 C86,161 93,157 99,161 C101,163 105,167 105,167
           C105,167 109,163 111,161 C117,157 124,161 124,169 C124,180 105,194 105,194 Z"
    fill="none" stroke="#D4B46A" stroke-width="2" opacity="0.55"/>

  <!-- ====== WINGS ====== -->
  <!-- left -->
  <path d="M34,186 C24,172 22,198 26,214 C30,228 44,238 56,228 C63,221 58,205 46,197 C39,192 34,186 34,186 Z"
    fill="#7E9E8C" filter="url(#ptex)"/>
  <path d="M28,196 C33,189 43,187 53,191" stroke="#5F7A6C" stroke-width="1.2" fill="none" opacity="0.42"/>
  <path d="M26,210 C32,203 43,201 53,206" stroke="#5F7A6C" stroke-width="1" fill="none" opacity="0.35"/>
  <!-- right -->
  <path d="M176,186 C186,172 188,198 184,214 C180,228 166,238 154,228 C147,221 152,205 164,197 C171,192 176,186 176,186 Z"
    fill="#7E9E8C" filter="url(#ptex)"/>
  <path d="M182,196 C177,189 167,187 157,191" stroke="#5F7A6C" stroke-width="1.2" fill="none" opacity="0.42"/>
  <path d="M184,210 C178,203 167,201 157,206" stroke="#5F7A6C" stroke-width="1" fill="none" opacity="0.35"/>

  <!-- body feather details -->
  <path d="M58,206 C65,199 76,197 90,201" stroke="#5F7A6C" stroke-width="1.2" fill="none" opacity="0.32"/>
  <path d="M56,222 C64,215 76,213 92,218" stroke="#5F7A6C" stroke-width="1" fill="none" opacity="0.27"/>
  <path d="M60,238 C68,231 80,229 95,234" stroke="#5F7A6C" stroke-width="0.9" fill="none" opacity="0.22"/>

  <!-- ====== LEGS ====== -->
  <path d="M86,276 L82,292" stroke="#5F7A6C" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <path d="M82,292 L64,300 M82,292 L80,302 M82,292 L94,300 M82,292 L77,285"
    stroke="#5F7A6C" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <path d="M124,276 L128,292" stroke="#5F7A6C" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <path d="M128,292 L110,300 M128,292 L130,302 M128,292 L142,300 M128,292 L134,285"
    stroke="#5F7A6C" stroke-width="3.5" stroke-linecap="round" fill="none"/>
</svg>